MENU LABEL Arcade Linux (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 rd.udev.log_level=3 plymouth.ignore-serial-consoles udev.log_level=3 vt.global_cursor_default=0 cow_spacesize=4G copytoram=n nvme_load=yes edd=off

